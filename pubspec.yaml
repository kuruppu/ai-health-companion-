name: ai_health_companion
description: AI-powered health coach for personalized nutrition, workouts, and wellness guidance.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Local Database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # Key-Value Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_storage: ^11.5.6
  cloud_firestore: ^4.13.6
  firebase_crashlytics: ^3.4.8
  firebase_analytics: ^10.7.4

  # API & Network
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^5.0.2

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.2
  shared_preferences: ^2.2.2
  flutter_logs: ^2.1.12
  logger: ^2.0.2+1

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # Permissions
  permission_handler: ^11.1.0

  # Image Handling
  image_picker: ^1.0.5
  image_cropper: ^5.0.1

  # Biometric Auth
  local_auth: ^2.1.8

  # Voice & Speech
  speech_to_text: ^6.5.1
  flutter_tts: ^3.8.5

  # Notifications
  flutter_local_notifications: ^16.3.0
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting & Analysis
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.7
  drift_dev: ^2.14.0
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1

  # Testing
  mockito: ^5.4.2
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

