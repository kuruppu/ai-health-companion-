name: ai_health_companion
description: AI-powered health coach for personalized nutrition, workouts, and wellness guidance.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^3.5.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^17.3.0

  # Local Database
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.1
  path: ^1.8.3

  # Key-Value Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_storage: ^13.4.3
  cloud_firestore: ^6.6.0
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3

  # API & Network
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^7.2.0

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^2.7.1

  # Utilities
  intl: ^0.20.3
  uuid: ^4.2.2
  shared_preferences: ^2.2.2
  flutter_logs: ^2.1.12
  logger: ^2.0.2+1

  # Environment Variables
  flutter_dotenv: ^6.0.1

  # Permissions
  permission_handler: ^12.0.3

  # Image Handling
  image_picker: ^1.0.5
  image_cropper: ^12.2.1

  # Biometric Auth
  local_auth: ^3.0.1

  # Voice & Speech
  speech_to_text: ^7.4.0
  flutter_tts: ^4.2.5

  # Notifications
  flutter_local_notifications: ^22.0.1
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting & Analysis
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  drift_dev: ^2.21.2
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2

  # Testing
  mockito: ^5.4.2
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

